<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>more soon.</title>
  <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.23.1/es6/core.js,npm/focus-visible@5,npm/html-midi-player@1.5.0"></script>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Code", "Courier New", monospace;
      font-size: 16px;
      line-height: 1.6;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 12vh 24px 6rem;
    }
    a { color: #1a56db; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { font-size: 0.9rem; color: #888; margin-bottom: 3rem; }
    .nav a { color: #555; }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
    }
    .sub { color: #666; margin: 0 0 2rem; }
    .track { font-weight: 700; margin: 0 0 0.75rem; }
    midi-player {
      width: 100%;
      max-width: 520px;
      display: block;
      margin-bottom: 1rem;
    }
    midi-visualizer { display: block; max-width: 520px; }
    footer { margin-top: 3rem; font-size: 0.85rem; color: #999; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">[ <a href="https://nathanyan.vercel.app/">home</a> ]</div>

    <h1>more soon.</h1>
    <p class="sub">a small thing in the meantime &mdash; press play.</p>

    <p class="track">nettspend &mdash; we not like you</p>
    <midi-player
      src="nettspend%20-%20we%20not%20like%20you.mid"
      sound-font
      visualizer="#vis">
    </midi-player>
    <midi-visualizer id="vis" type="piano-roll"></midi-visualizer>

    <footer>/ more soon.</footer>
  </div>
</body>
</html>
