<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>more soon.</title>
  <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.23.1/es6/core.js,npm/focus-visible@5,npm/html-midi-player@1.5.0"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      padding: 1rem;
      box-sizing: border-box;
    }
    .more { font-size: 2rem; letter-spacing: 0.02em; }
    .track { font-size: 0.9rem; color: #777; }
    midi-player {
      width: min(90vw, 480px);
      --md-sys-color-primary: #eee;
      --md-sys-color-on-primary: #000;
      --md-sys-color-surface: #111;
      --md-sys-color-on-surface: #eee;
      --md-sys-color-on-surface-variant: #aaa;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="more">more soon.</div>
    <midi-player
      src="nettspend%20-%20we%20not%20like%20you.mid"
      sound-font
      visualizer="#vis">
    </midi-player>
    <midi-visualizer id="vis" type="piano-roll"></midi-visualizer>
    <div class="track">nettspend &mdash; we not like you</div>
  </div>
</body>
</html>
